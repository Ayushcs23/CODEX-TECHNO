<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-indigo-600 mb-2">Task Manager</h1>
            <p class="text-gray-600">Organize your tasks efficiently</p>
        </header>

        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <div class="flex gap-2 mb-4">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..." 
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                >
                <button 
                    id="addTaskBtn" 
                    class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors flex items-center gap-2"
                >
                    <i class="fas fa-plus"></i> Add
                </button>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-list-ul text-indigo-500"></i> Pending Tasks
                    <span id="pendingCount" class="ml-auto bg-gray-200 text-gray-800 text-sm px-2 py-1 rounded-full">0</span>
                </h2>
                <ul id="pendingTasks" class="space-y-2 transition-all duration-200">
                    <!-- Tasks will be added here -->
                </ul>
            </div>

            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-check-circle text-green-500"></i> Completed Tasks
                    <span id="completedCount" class="ml-auto bg-gray-200 text-gray-800 text-sm px-2 py-1 rounded-full">0</span>
                </h2>
                <ul id="completedTasks" class="space-y-2 transition-all duration-200">
                    <!-- Completed tasks will be added here -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-md animate-modal">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">Edit Task</h3>
                <button id="closeModal" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <input 
                type="text" 
                id="editTaskInput" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            >
            <div class="flex justify-end gap-2">
                <button id="saveEditBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors">
                    Save
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
